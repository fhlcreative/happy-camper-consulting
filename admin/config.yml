backend:
  name: github
  repo: fhlcreative/happy-camper-consulting
  branch: main
  base_url: https://happy-camper-consulting.vercel.app
  auth_endpoint: api/auth

media_folder: "images/articles"
public_folder: "/images/articles"

collections:
  - name: "downloads"
    label: "Downloads"
    label_singular: "Download"
    folder: "resources/downloads"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    media_folder: ""
    public_folder: "/resources/downloads"
    description: "Upload PDFs to share via direct link. Use the Copy Link button to grab the URL."
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Name for this download (for your reference only)" }
      - { label: "PDF File", name: "file", widget: "file", hint: "Upload a PDF. After saving, copy the file path shown here to share as a link." }
      - { label: "Notes", name: "body", widget: "markdown", required: false, hint: "Optional notes about this file (not shown publicly)" }

  - name: "insights"
    label: "Insights Articles"
    folder: "insights/articles"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["title", "date", "category"]
    view_filters:
      - { label: "Culture", field: "category", pattern: "Culture" }
      - { label: "Leadership", field: "category", pattern: "Leadership" }
      - { label: "Sustainability", field: "category", pattern: "Sustainability" }
      - { label: "Safety & Systems", field: "category", pattern: "Safety & Systems" }
    view_groups:
      - { label: "Category", field: "category" }
      - { label: "Year", field: "date", pattern: "\\d{4}" }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "MM/DD/YYYY", time_format: false }
      - { label: "Category", name: "category", widget: "select", options: ["Culture", "Leadership", "Sustainability", "Safety & Systems"] }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false, hint: "Short summary for article cards (1-2 sentences)" }
      - { label: "Body", name: "body", widget: "markdown" }
