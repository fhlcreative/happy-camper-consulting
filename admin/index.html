<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Happy Camper — Content Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    // Add "Copy Link" buttons to Downloads list items
    (function() {
      const DOMAIN = 'happycamperconsultant.com';
      const REPO = 'fhlcreative/happy-camper-consulting';
      const cache = {};

      async function getFileUrl(slug) {
        if (cache[slug]) return cache[slug];
        try {
          const res = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/resources/downloads/' + slug + '.md');
          if (!res.ok) return null;
          const text = await res.text();
          const match = text.match(/file:\s*["']?([^\s"']+\.pdf)["']?/);
          if (match) {
            const filename = match[1].split('/').pop();
            const url = 'https://' + DOMAIN + '/resources/downloads/' + filename;
            cache[slug] = url;
            return url;
          }
        } catch(e) {}
        return null;
      }

      function update() {
        // Only run on the downloads list page
        if (location.hash !== '#/collections/downloads' &&
            !location.hash.startsWith('#/collections/downloads?')) return;

        // Find all links that point to download entries
        const links = document.querySelectorAll('a[href*="/collections/downloads/entries/"]');
        links.forEach(function(link) {
          const row = link.closest('li, tr, [role="row"]') || link.parentElement;
          if (!row || row.querySelector('.hcc-copy-btn')) return;

          const slugMatch = link.getAttribute('href').match(/entries\/([^/]+)/);
          if (!slugMatch) return;
          const slug = slugMatch[1];

          const btn = document.createElement('button');
          btn.className = 'hcc-copy-btn';
          btn.textContent = 'Copy Link';
          btn.style.cssText = 'margin-left:auto;background:#1a2744;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;position:absolute;right:16px;top:50%;transform:translateY(-50%);';
          row.style.position = 'relative';

          btn.addEventListener('click', async function(e) {
            e.preventDefault();
            e.stopPropagation();
            btn.textContent = '...';
            const url = await getFileUrl(slug);
            if (url) {
              await navigator.clipboard.writeText(url);
              btn.textContent = 'Copied!';
              btn.style.background = '#c4922a';
              setTimeout(function() {
                btn.textContent = 'Copy Link';
                btn.style.background = '#1a2744';
              }, 2000);
            } else {
              btn.textContent = 'Error';
              setTimeout(function() { btn.textContent = 'Copy Link'; }, 2000);
            }
          });

          row.appendChild(btn);
        });
      }

      setInterval(update, 1500);
    })();
  </script>
</body>
</html>
