<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Happy Camper — Content Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    // Clear any stuck Sveltia draft backups for downloads entries
    (function() {
      try {
        var dbs = indexedDB.databases ? indexedDB.databases() : null;
        if (dbs) dbs.then(function(list) {
          list.forEach(function(db) {
            if (db.name && db.name.includes('sveltia')) {
              var req = indexedDB.open(db.name);
              req.onsuccess = function() {
                var d = req.result;
                var names = Array.from(d.objectStoreNames);
                names.forEach(function(n) {
                  if (n.includes('draft') || n.includes('backup')) {
                    try {
                      var tx = d.transaction(n, 'readwrite');
                      tx.objectStore(n).clear();
                    } catch(e) {}
                  }
                });
                d.close();
              };
            }
          });
        });
      } catch(e) {}
    })();

    // Copy Link functionality for Downloads collection
    (function() {
      const DOMAIN = 'happycamperconsultant.com';
      const REPO = 'fhlcreative/happy-camper-consulting';
      let entryEnhanced = '';
      let listEnhanced = false;

      function makeCopyBtn(url, label) {
        const btn = document.createElement('button');
        btn.textContent = label || 'Copy Link';
        btn.style.cssText = 'background:#1a2744;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;';
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          navigator.clipboard.writeText(url).then(function() {
            btn.textContent = 'Copied!';
            btn.style.background = '#c4922a';
            setTimeout(function() {
              btn.textContent = label || 'Copy Link';
              btn.style.background = '#1a2744';
            }, 2000);
          });
        });
        return btn;
      }

      // --- ENTRY PAGE: Copy button inline next to PDF path in preview ---
      function handleEntryPage() {
        const m = location.hash.match(/\/collections\/downloads\/entries\/([^/?]+)/);
        if (!m) {
          entryEnhanced = '';
          document.querySelectorAll('.hcc-inline-btn').forEach(function(el) { el.remove(); });
          return;
        }
        if (m[1] === entryEnhanced) return;

        // Find the LAST text node matching the PDF path (preview pane comes after edit pane)
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        let target = null;
        while (walker.nextNode()) {
          if (walker.currentNode.textContent.trim().match(/^resources\/downloads\/.+\.pdf$/)) {
            target = walker.currentNode;
          }
        }
        if (!target) return;

        const filename = target.textContent.trim().split('/').pop();
        const fullUrl = 'https://' + DOMAIN + '/resources/downloads/' + filename;
        const parent = target.parentElement;
        if (!parent) return;

        document.querySelectorAll('.hcc-inline-btn').forEach(function(el) { el.remove(); });

        // Insert button inline right after the path text
        const btn = makeCopyBtn(fullUrl);
        btn.className = 'hcc-inline-btn';
        btn.style.cssText += ';margin-left:10px;vertical-align:middle;display:inline-block;';
        parent.style.display = 'inline';
        parent.insertAdjacentElement('afterend', btn);
        entryEnhanced = m[1];
      }

      // --- LIST PAGE: Overlay Copy buttons using GitHub API + bounding rects ---
      let listCache = null;

      async function loadListCache() {
        if (listCache) return listCache;
        try {
          const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/resources/downloads');
          if (!res.ok) return null;
          const files = await res.json();
          const mdFiles = files.filter(function(f) { return f.name.endsWith('.md'); });
          const entries = {};
          for (const f of mdFiles) {
            const raw = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/resources/downloads/' + f.name);
            const text = await raw.text();
            const titleMatch = text.match(/title:\s*["']?(.+?)["']?\s*$/m);
            const fileMatch = text.match(/file:\s*["']?([^\s"']+)["']?/);
            if (titleMatch && fileMatch) {
              const filename = fileMatch[1].split('/').pop();
              entries[titleMatch[1].trim()] = 'https://' + DOMAIN + '/resources/downloads/' + filename;
            }
          }
          listCache = entries;
          return entries;
        } catch(e) { return null; }
      }

      function handleListPage() {
        const onList = location.hash === '#/collections/downloads' ||
                       location.hash.startsWith('#/collections/downloads?');
        const container = document.getElementById('hcc-list-overlay');

        if (!onList) {
          if (container) container.style.display = 'none';
          return;
        }

        // Find entry title text nodes on the page
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        const titleNodes = [];
        while (walker.nextNode()) {
          const text = walker.currentNode.textContent.trim();
          // Skip short text, headers, UI labels
          if (text.length > 2 && text.length < 200 &&
              !text.includes('Downloads') && !text.includes('Upload') &&
              !text.includes('Search') && !text.includes('Sort') &&
              !text.includes('Delete') && !text.includes('New') &&
              !text.includes('Insights') && !text.includes('Collections') &&
              !text.includes('Copy')) {
            titleNodes.push(walker.currentNode);
          }
        }

        if (!titleNodes.length) return;

        // Load file URLs then position buttons
        loadListCache().then(function(entries) {
          if (!entries) return;

          // Remove old overlay
          const old = document.getElementById('hcc-list-overlay');
          if (old) old.remove();

          const overlay = document.createElement('div');
          overlay.id = 'hcc-list-overlay';
          overlay.style.cssText = 'position:fixed;top:0;left:0;width:0;height:0;z-index:99999;pointer-events:none;';

          titleNodes.forEach(function(node) {
            const title = node.textContent.trim();
            if (!entries[title]) return;

            const rect = node.parentElement.getBoundingClientRect();
            if (rect.width === 0) return;

            // Find the full row width — go up to find a wider container
            let rowEl = node.parentElement;
            while (rowEl.parentElement && rowEl.getBoundingClientRect().width < 400) {
              rowEl = rowEl.parentElement;
            }
            const rowRect = rowEl.getBoundingClientRect();

            const btn = document.createElement('button');
            btn.textContent = 'Copy Link';
            btn.style.cssText = 'position:fixed;pointer-events:auto;background:#1a2744;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;' +
              'top:' + (rowRect.top + rowRect.height/2 - 13) + 'px;' +
              'right:' + (window.innerWidth - rowRect.right + 16) + 'px;';

            btn.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              navigator.clipboard.writeText(entries[title]).then(function() {
                btn.textContent = 'Copied!';
                btn.style.background = '#c4922a';
                setTimeout(function() {
                  btn.textContent = 'Copy Link';
                  btn.style.background = '#1a2744';
                }, 2000);
              });
            });

            overlay.appendChild(btn);
          });

          document.body.appendChild(overlay);
        });
      }

      setInterval(function() {
        handleEntryPage();
        handleListPage();
      }, 1200);
    })();
  </script>
</body>
</html>
