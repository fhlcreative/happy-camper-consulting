<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Happy Camper — Content Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    // Add floating "Copy Download Link" bar when editing a Downloads entry
    (function() {
      const DOMAIN = 'happycamperconsultant.com';
      let lastPath = '';

      function findFilePath() {
        // Search all text nodes on the page for a resources/downloads path
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
          const match = walker.currentNode.textContent.match(/resources\/downloads\/[^\s]+\.pdf/);
          if (match) return match[0];
        }
        return '';
      }

      function update() {
        const onDownloadsEntry = location.hash.includes('/collections/downloads/entries/');
        const bar = document.getElementById('hcc-copy-bar');

        if (!onDownloadsEntry) {
          if (bar) bar.style.display = 'none';
          lastPath = '';
          return;
        }

        const filePath = findFilePath();
        if (!filePath || filePath === lastPath) {
          if (bar && filePath) bar.style.display = 'flex';
          return;
        }
        lastPath = filePath;
        const filename = filePath.split('/').pop();
        const fullUrl = 'https://' + DOMAIN + '/resources/downloads/' + filename;

        if (bar) bar.remove();

        const wrapper = document.createElement('div');
        wrapper.id = 'hcc-copy-bar';
        wrapper.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#1a2744;color:#fff;display:flex;align-items:center;gap:12px;padding:10px 20px;font-family:-apple-system,sans-serif;font-size:13px;box-shadow:0 -2px 8px rgba(0,0,0,.2);';

        const label = document.createElement('span');
        label.textContent = 'Download link:';
        label.style.cssText = 'opacity:0.7;white-space:nowrap;';

        const urlText = document.createElement('code');
        urlText.textContent = fullUrl;
        urlText.style.cssText = 'flex:1;color:#c4922a;word-break:break-all;';

        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Copy Link';
        copyBtn.style.cssText = 'background:#c4922a;color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;';
        copyBtn.addEventListener('click', function(e) {
          e.preventDefault();
          navigator.clipboard.writeText(fullUrl).then(function() {
            copyBtn.textContent = 'Copied!';
            copyBtn.style.background = '#2d6a4f';
            setTimeout(function() {
              copyBtn.textContent = 'Copy Link';
              copyBtn.style.background = '#c4922a';
            }, 2000);
          });
        });

        wrapper.appendChild(label);
        wrapper.appendChild(urlText);
        wrapper.appendChild(copyBtn);
        document.body.appendChild(wrapper);
      }

      setInterval(update, 1500);
    })();
  </script>
</body>
</html>
