<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Happy Camper — Content Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    // Add full URL + Copy button in the Preview pane next to PDF path
    (function() {
      const DOMAIN = 'happycamperconsultant.com';
      let enhanced = false;
      let lastHash = '';

      function findAndEnhance() {
        // Only on downloads entry pages
        if (!location.hash.includes('/collections/downloads/entries/')) {
          enhanced = false;
          lastHash = '';
          return;
        }

        // Reset if navigated to a different entry
        if (location.hash !== lastHash) {
          enhanced = false;
          lastHash = location.hash;
          // Remove old enhancements
          document.querySelectorAll('.hcc-url-row').forEach(el => el.remove());
        }

        if (enhanced) return;

        // Search all text nodes for the PDF path pattern
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        let targetNode = null;
        while (walker.nextNode()) {
          const text = walker.currentNode.textContent.trim();
          if (text.match(/^resources\/downloads\/.+\.pdf$/)) {
            targetNode = walker.currentNode;
            break;
          }
        }

        if (!targetNode) return;

        const filename = targetNode.textContent.trim().split('/').pop();
        const fullUrl = 'https://' + DOMAIN + '/resources/downloads/' + filename;
        const parent = targetNode.parentElement;
        if (!parent) return;

        // Create a row with the full URL and copy button
        const row = document.createElement('div');
        row.className = 'hcc-url-row';
        row.style.cssText = 'display:flex;align-items:center;gap:10px;margin-top:8px;padding:8px 12px;background:#f0f4f8;border-radius:6px;font-family:-apple-system,sans-serif;';

        const urlText = document.createElement('code');
        urlText.textContent = fullUrl;
        urlText.style.cssText = 'flex:1;font-size:13px;color:#1a2744;word-break:break-all;';

        const btn = document.createElement('button');
        btn.textContent = 'Copy Link';
        btn.style.cssText = 'background:#1a2744;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;';
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          navigator.clipboard.writeText(fullUrl).then(function() {
            btn.textContent = 'Copied!';
            btn.style.background = '#c4922a';
            setTimeout(function() {
              btn.textContent = 'Copy Link';
              btn.style.background = '#1a2744';
            }, 2000);
          });
        });

        row.appendChild(urlText);
        row.appendChild(btn);
        parent.insertAdjacentElement('afterend', row);
        enhanced = true;
      }

      setInterval(findAndEnhance, 1000);
    })();
  </script>
</body>
</html>
