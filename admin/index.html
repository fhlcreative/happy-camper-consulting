<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Happy Camper — Content Manager</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    // Clear any stuck Sveltia draft backups for downloads entries
    (function() {
      try {
        var dbs = indexedDB.databases ? indexedDB.databases() : null;
        if (dbs) dbs.then(function(list) {
          list.forEach(function(db) {
            if (db.name && db.name.includes('sveltia')) {
              var req = indexedDB.open(db.name);
              req.onsuccess = function() {
                var d = req.result;
                var names = Array.from(d.objectStoreNames);
                names.forEach(function(n) {
                  if (n.includes('draft') || n.includes('backup')) {
                    try {
                      var tx = d.transaction(n, 'readwrite');
                      tx.objectStore(n).clear();
                    } catch(e) {}
                  }
                });
                d.close();
              };
            }
          });
        });
      } catch(e) {}
    })();

    // Copy Link functionality for Downloads collection
    (function() {
      const DOMAIN = 'happycamperconsultant.com';
      const REPO = 'fhlcreative/happy-camper-consulting';
      let entryEnhanced = '';
      let listEnhanced = false;

      function makeCopyBtn(url, label) {
        const btn = document.createElement('button');
        btn.textContent = label || 'Copy Link';
        btn.style.cssText = 'background:#1a2744;color:#fff;border:none;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;';
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          navigator.clipboard.writeText(url).then(function() {
            btn.textContent = 'Copied!';
            btn.style.background = '#c4922a';
            setTimeout(function() {
              btn.textContent = label || 'Copy Link';
              btn.style.background = '#1a2744';
            }, 2000);
          });
        });
        return btn;
      }

      // --- ENTRY PAGE: Copy button inline next to PDF path in preview ---
      function handleEntryPage() {
        const m = location.hash.match(/\/collections\/downloads\/entries\/([^/?]+)/);
        if (!m) {
          entryEnhanced = '';
          document.querySelectorAll('.hcc-inline-btn').forEach(function(el) { el.remove(); });
          return;
        }
        if (m[1] === entryEnhanced) return;

        // Find the LAST text node matching the PDF path (preview pane comes after edit pane)
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
        let target = null;
        while (walker.nextNode()) {
          if (walker.currentNode.textContent.trim().match(/^resources\/downloads\/.+\.pdf$/)) {
            target = walker.currentNode;
          }
        }
        if (!target) return;

        const filename = target.textContent.trim().split('/').pop();
        const fullUrl = 'https://' + DOMAIN + '/resources/downloads/' + filename;
        const parent = target.parentElement;
        if (!parent) return;

        document.querySelectorAll('.hcc-inline-btn').forEach(function(el) { el.remove(); });

        // Insert button inline right after the path text
        const btn = makeCopyBtn(fullUrl);
        btn.className = 'hcc-inline-btn';
        btn.style.cssText += ';margin-left:10px;vertical-align:middle;display:inline-block;';
        parent.style.display = 'inline';
        parent.insertAdjacentElement('afterend', btn);
        entryEnhanced = m[1];
      }

      // --- LIST PAGE: Copy button on each list row ---
      function handleListPage() {
        const onList = location.hash === '#/collections/downloads' ||
                       location.hash.startsWith('#/collections/downloads?');
        if (!onList) {
          listEnhanced = false;
          return;
        }

        // Deep-search for links to download entries (traverse shadow roots)
        function deepQuery(root) {
          let results = [];
          const links = root.querySelectorAll('a[href*="downloads/entries"]');
          results = results.concat(Array.from(links));
          root.querySelectorAll('*').forEach(function(el) {
            if (el.shadowRoot) {
              results = results.concat(deepQuery(el.shadowRoot));
            }
          });
          return results;
        }

        const links = deepQuery(document);
        if (!links.length) return;
        if (listEnhanced && document.querySelector('.hcc-list-btn')) return;

        links.forEach(function(link) {
          const row = link.closest('li, tr, div, article') || link.parentElement;
          if (!row || row.querySelector('.hcc-list-btn')) return;

          const slugMatch = (link.getAttribute('href') || '').match(/entries\/([^/?]+)/);
          if (!slugMatch) return;
          const slug = slugMatch[1];

          const btn = document.createElement('button');
          btn.className = 'hcc-list-btn';
          btn.textContent = 'Copy Link';
          btn.style.cssText = 'background:#1a2744;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:10;';
          row.style.position = 'relative';

          btn.addEventListener('click', async function(e) {
            e.preventDefault();
            e.stopPropagation();
            btn.textContent = '...';
            try {
              const res = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/resources/downloads/' + slug + '.md');
              const text = await res.text();
              const fm = text.match(/file:\s*["']?([^\s"']+)["']?/);
              if (fm) {
                const filename = fm[1].split('/').pop();
                const url = 'https://' + DOMAIN + '/resources/downloads/' + filename;
                await navigator.clipboard.writeText(url);
                btn.textContent = 'Copied!';
                btn.style.background = '#c4922a';
                setTimeout(function() {
                  btn.textContent = 'Copy Link';
                  btn.style.background = '#1a2744';
                }, 2000);
                return;
              }
            } catch(ex) {}
            btn.textContent = 'Error';
            setTimeout(function() { btn.textContent = 'Copy Link'; }, 2000);
          });

          row.appendChild(btn);
        });
        listEnhanced = true;
      }

      setInterval(function() {
        handleEntryPage();
        handleListPage();
      }, 1200);
    })();
  </script>
</body>
</html>
