<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — Happy Camper Consulting</title>
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    .article-hero {
      background: var(--color-navy-deep);
      padding: var(--space-section) var(--space-xl) var(--space-3xl);
      text-align: center;
    }
    .article-hero__category {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-gold);
      margin-bottom: var(--space-md);
    }
    .article-hero h1 {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
      color: #fff;
      max-width: 720px;
      margin: 0 auto var(--space-lg);
      line-height: 1.25;
    }
    .article-hero__date {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: rgba(255,255,255,0.4);
    }

    .article-body {
      max-width: 700px;
      margin: 0 auto;
      padding: var(--space-3xl) var(--space-xl) var(--space-section);
      font-family: var(--font-body);
      font-size: var(--text-lg);
      line-height: 1.8;
      color: var(--color-text);
    }

    .article-body h2 {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      color: var(--color-navy);
      margin: 2.5rem 0 1rem;
      line-height: 1.3;
    }
    .article-body h3 {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      color: var(--color-navy);
      margin: 2rem 0 0.75rem;
    }
    .article-body p {
      margin-bottom: 1.5rem;
    }
    .article-body strong {
      color: var(--color-navy);
    }
    .article-body ol,
    .article-body ul {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }
    .article-body li {
      margin-bottom: 0.75rem;
    }
    .article-body blockquote {
      border-left: 3px solid var(--color-gold);
      padding: 1rem 1.5rem;
      margin: 2rem 0;
      background: var(--color-gold-muted);
      font-style: italic;
      color: var(--color-navy);
    }
    .article-body img {
      max-width: 100%;
      border-radius: 6px;
      margin: 2rem 0;
    }
    .article-body a {
      color: var(--color-gold);
      text-decoration: underline;
    }

    .article-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-gold);
      text-decoration: none;
      padding: var(--space-xl) 0;
      max-width: 700px;
      margin: 0 auto;
      display: block;
      padding-left: var(--space-xl);
    }
    .article-back:hover { text-decoration: underline; }

    .article-featured-img {
      max-width: 900px;
      margin: -2rem auto 0;
      padding: 0 var(--space-xl);
    }
    .article-featured-img img {
      width: 100%;
      border-radius: 8px;
      box-shadow: var(--shadow-md);
    }
  </style>
</head>
<body>

  <a class="article-back" href="index.html">← Back to Insights</a>

  <section class="article-hero" id="hero">
    <div class="article-hero__category" id="category"></div>
    <h1 id="title">Loading...</h1>
    <div class="article-hero__date" id="date"></div>
  </section>

  <div class="article-featured-img" id="featured-img-wrap" style="display:none;">
    <img id="featured-img" src="" alt="">
  </div>

  <article class="article-body" id="content">
    <p>Loading article...</p>
  </article>

  <a class="article-back" href="index.html" style="padding-bottom:var(--space-section);">← Back to Insights</a>

  <script>
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug');

    if (!slug) {
      document.getElementById('content').innerHTML = '<p>Article not found.</p>';
    } else {
      fetch('articles/' + slug + '.md')
        .then(function(r) { return r.text(); })
        .then(function(text) {
          // Parse front matter
          var parts = text.split('---');
          var frontMatter = {};
          if (parts.length >= 3) {
            parts[1].trim().split('\n').forEach(function(line) {
              var colon = line.indexOf(':');
              if (colon > -1) {
                var key = line.substring(0, colon).trim();
                var val = line.substring(colon + 1).trim().replace(/^["']|["']$/g, '');
                frontMatter[key] = val;
              }
            });
            var body = parts.slice(2).join('---').trim();
          } else {
            var body = text;
          }

          // Populate hero
          document.getElementById('title').textContent = frontMatter.title || slug;
          document.title = (frontMatter.title || slug) + ' — Happy Camper Consulting';
          document.getElementById('category').textContent = frontMatter.category || '';

          if (frontMatter.date) {
            var d = new Date(frontMatter.date);
            document.getElementById('date').textContent = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          }

          if (frontMatter.featured_image) {
            document.getElementById('featured-img').src = frontMatter.featured_image;
            document.getElementById('featured-img').alt = frontMatter.title || '';
            document.getElementById('featured-img-wrap').style.display = 'block';
          }

          // Render markdown
          document.getElementById('content').innerHTML = marked.parse(body);
        })
        .catch(function() {
          document.getElementById('content').innerHTML = '<p>Article not found.</p>';
        });
    }
  </script>

</body>
</html>
