<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights — Happy Camper Consulting</title>
  <meta name="description" content="Articles on camp culture, leadership, sustainability, and safety from Jeff Rorabaugh — 32+ years of camp leadership experience.">
  <meta name="robots" content="index, follow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">

  <script src="../js/main.js" defer></script>

  <style>
    .insights-hero {
      background: var(--color-navy-deep);
      padding: var(--space-section) var(--space-xl) var(--space-3xl);
      text-align: center;
    }
    .insights-hero h1 {
      font-family: var(--font-heading);
      font-size: var(--text-3xl);
      color: #fff;
      margin-bottom: var(--space-md);
    }
    .insights-hero p {
      font-family: var(--font-body);
      font-size: var(--text-lg);
      color: rgba(255,255,255,0.6);
      max-width: 540px;
      margin: 0 auto;
    }

    .insights-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--space-3xl) var(--space-xl);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }

    .insight-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow 0.3s, transform 0.3s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .insight-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .insight-card__image {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--color-gold-muted);
    }
    .insight-card__image--placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-navy) 0%, var(--color-navy-light) 100%);
      color: var(--color-gold);
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      padding: 1.5rem;
      text-align: center;
      line-height: 1.3;
    }

    .insight-card__body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .insight-card__category {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-gold);
      margin-bottom: 0.75rem;
    }

    .insight-card__title {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--color-navy);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .insight-card__excerpt {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.6;
      flex: 1;
    }

    .insight-card__date {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      color: var(--color-text-light);
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
    }

    .category-filter {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--space-xl) var(--space-xl) 0;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .category-filter button {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--color-border);
      border-radius: 100px;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all 0.25s;
    }
    .category-filter button:hover,
    .category-filter button.active {
      background: var(--color-navy);
      color: #fff;
      border-color: var(--color-navy);
    }
  </style>
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="navbar navbar--transparent" role="navigation" aria-label="Main navigation">
    <div class="navbar__inner">
      <a href="../" class="navbar__logo" aria-label="Happy Camper Consulting — Home">
        <img src="../images/logo/logo-white.png" alt="Happy Camper Consulting" width="548" height="143">
      </a>
      <ul class="navbar__links">
        <li><a href="../#why">Why Us</a></li>
        <li><a href="../#framework">How We Help</a></li>
        <li><a href="../#who">Who It's For</a></li>
        <li><a href="../#about">Approach</a></li>
        <li><a href="./">Insights</a></li>
        <li class="navbar__cta">
          <a href="https://happycamperconsultant.com/conversation/" class="btn btn--primary">Schedule a Conversation</a>
        </li>
      </ul>
      <button class="hamburger-btn" aria-label="Open menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <div class="mobile-nav__overlay" aria-hidden="true"></div>
  <div class="mobile-nav" role="dialog" aria-label="Mobile navigation">
    <ul>
      <li><a href="../#why">Why Us</a></li>
      <li><a href="../#framework">How We Help</a></li>
      <li><a href="../#who">Who It's For</a></li>
      <li><a href="../#about">Approach</a></li>
      <li><a href="./">Insights</a></li>
    </ul>
    <a href="https://happycamperconsultant.com/conversation/" class="btn btn--primary">Schedule a Conversation</a>
  </div>

  <section class="insights-hero">
    <h1>Insights</h1>
    <p>Thoughts on camp culture, leadership, sustainability, and the systems that hold it all together.</p>
  </section>

  <div class="category-filter" id="filters">
    <button class="active" data-category="all">All</button>
    <button data-category="Culture">Culture</button>
    <button data-category="Leadership">Leadership</button>
    <button data-category="Sustainability">Sustainability</button>
    <button data-category="Safety & Systems">Safety & Systems</button>
  </div>

  <div class="insights-grid" id="articles-grid">
    <!-- Articles injected by JS -->
  </div>

  <script>
    // Article registry — Decap CMS commits markdown files, this list drives the static rendering.
    // When a new article is published via /admin, add it here (or automate via build script).
    var articles = [
      {
        slug: "why-culture-eats-strategy",
        title: "Why Culture Eats Strategy for Breakfast at Camp",
        date: "2026-03-03",
        category: "Culture",
        excerpt: "You can have the best programming, the newest facilities, and a killer marketing plan — but if your culture is broken, none of it matters.",
        image: "/images/articles/campfire-friends.jpg"
      }
    ];

    var grid = document.getElementById('articles-grid');
    var filters = document.getElementById('filters');

    function renderArticles(filter) {
      grid.innerHTML = '';
      var filtered = filter === 'all' ? articles : articles.filter(function(a) { return a.category === filter; });

      filtered.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

      filtered.forEach(function(article) {
        var card = document.createElement('a');
        card.className = 'insight-card';
        card.href = 'article.html?slug=' + article.slug;

        var imageHtml = article.image
          ? '<img class="insight-card__image" src="' + article.image + '" alt="' + article.title + '" loading="lazy">'
          : '<div class="insight-card__image insight-card__image--placeholder">' + article.title + '</div>';

        var dateObj = new Date(article.date + 'T12:00:00');
        var dateStr = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        card.innerHTML = imageHtml +
          '<div class="insight-card__body">' +
            '<span class="insight-card__category">' + article.category + '</span>' +
            '<h2 class="insight-card__title">' + article.title + '</h2>' +
            '<p class="insight-card__excerpt">' + (article.excerpt || '') + '</p>' +
            '<span class="insight-card__date">' + dateStr + '</span>' +
          '</div>';

        grid.appendChild(card);
      });
    }

    filters.addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      filters.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      renderArticles(e.target.dataset.category);
    });

    renderArticles('all');
  </script>

</body>
</html>
